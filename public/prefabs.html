<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>7 Days to Die Prefab List</title>
    <script src="prefabs.js" async></script>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" type="text/css" href="common.css" />
    <link rel="stylesheet" type="text/css" href="prefabs.css" />
  </head>
  <body>
    <h1>7 Days to Die Prefab List</h1>

    <div id="header">
      <section>
        <p>Only supported in latest Google Chrome.</p>
        <nav>
          <ul>
            <li><a href=".">Map Renderer</a></li>
            <li>
              <a href="https://github.com/kui/7dtd-map">GitHub Repository</a>
            </li>
            <li>
              Block/Prefab Language:
              <select id="label-lang">
                <option selected>english</option>
              </select>
            </li>
          </ul>
        </nav>
      </section>

      <section id="filters">
        <section>
          <header>
            <h2>Tier</h2>
            <button id="tier-clear" title="Clear Tier Range">X</button>
          </header>
          <table>
            <tr>
              <th>Min</th>
              <td>
                💀<output data-sync-for="min-tier">0</output>
                <input
                  id="min-tier"
                  type="range"
                  min="0"
                  max="5"
                  value="0"
                  list="tiers"
                  data-min="tierRange"
                />
              </td>
            </tr>
            <tr>
              <th>Max</th>
              <td>
                💀<output data-sync-for="max-tier">5</output>
                <input
                  id="max-tier"
                  type="range"
                  min="0"
                  max="5"
                  value="5"
                  list="tiers"
                  data-max="tierRange"
                />
              </td>
            </tr>
          </table>
          <datalist id="tiers">
            <option value="0"></option>
            <option value="1"></option>
            <option value="2"></option>
            <option value="3"></option>
            <option value="4"></option>
            <option value="5"></option>
          </datalist>
        </section>
        <section>
          <h2>Prefab Name</h2>
          <div>
            <input id="prefab-filter" placeholder="Enter prefab name" />
            <button title="Clear" data-input-prefab-filter="">X</button>
          </div>
          <div>
            <label>
              <input id="only-new-prefabs" type="checkbox" /> Only new
              prefabs
            </label>
          </div>
        </section>
        <section>
          <h2>Block Name</h2>
          <div>
            <input id="block-filter" placeholder="Enter block name" />
            <button title="Clear" data-input-block-filter="">X</button>
          </div>
          <div>
            <label>
              Min Count:
              <input
                id="min-matched-block-count"
                type="number"
                min="1"
                max="999"
                placeholder="1-999"
              />
            </label>
          </div>
        </section>
        <section>
          <h2>Presets</h2>
          <button
            data-input-min-tier="0"
            data-input-prefab-filter="trader"
            data-input-block-filter=""
          >Traders</button>
          <button
            data-input-min-tier="0"
            data-input-max-tier="5"
            data-input-prefab-filter=""
            data-input-block-filter="(Grace|Super)Corn"
            data-input-min-matched-block-count=""
          >Super Corn</button>
          <button
            data-input-min-tier="0"
            data-input-max-tier="5"
            data-input-prefab-filter=""
            data-input-block-filter="^cntLootCrateHero"
            data-input-min-matched-block-count=""
          >Hidden Stash</button>
          <button
            data-input-min-tier="0"
            data-input-max-tier="5"
            data-input-prefab-filter=""
            data-input-block-filter="^cnt(LootCrateBook|Book|shelfSupply|StoreElectronicsBook|Desk|FileCabinet)(?!.*Empty)"
            data-input-min-matched-block-count="20"
          >More than 20 Book Containers</button>
        </section>
        <details>
          <summary>Advanced Filters</summary>
          <section id="prefab-excludes">
            <h2>Excludes</h2>
            <p>
              <label><input
                  type="checkbox"
                  value="^(?:aaa_|AAA_|spacercise_|terrain_smoothing_bug)"
                  checked
                />Test</label>
              <label><input
                  type="checkbox"
                  value="^rwg_tile_"
                  checked
                />Tiles</label>
              <label><input
                  type="checkbox"
                  value="^part_"
                  checked
                />Parts</label>
              <label>
                <input
                  type="checkbox"
                  value="^(?:deco_|desert_|departure_bridge_|departure_city_sign|player_start|rock_form|roadblock_|rwg_bridge|sign_|streets?_)"
                  checked
                />
                Decorations
              </label>
            </p>
          </section>
        </details>
      </section>
    </div>

    <h2>Prefabs</h2>
    <p id="prefabs-status"></p>
    <ul id="prefabs-list"></ul>
    <div id="prefab-link-tooltip" popover="manual" role="tooltip">
      <img id="prefab-link-tooltip-image" alt="" loading="lazy" />
    </div>
  </body>
</html>
