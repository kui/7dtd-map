name: Continuous Integration
on: push
permissions:
  contents: read
jobs:
  deno-run-ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno ci
      # Playwright's Linux runner needs system libraries; Windows ships them
      # with the browser bundle, so this step is Linux-only.
      - name: Install Playwright system dependencies
        if: runner.os == 'Linux'
        run: deno run -A @playwright/test install-deps chromium
      - run: deno task ci
