name: Continuous Integration
on: push
permissions:
  contents: read
jobs:
  deno-run-ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: deno ci
      - name: Install Playwright system dependencies
        if: runner.os == 'Linux'
        run: deno run -A @playwright/test install-deps chromium
      - run: deno task ci
